server:
  port: 8000

spring:
  application:
    name: gateway-service # 서비스 이름 정의

  cloud:
    gateway:
      # 디스커버리 기능 활성화
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true   # 서비스 ID를 소문자로 사용
      # --- 글로벌 타임아웃 설정 ---
      httpclient:
        # 전체 라우트에 적용될 응답 타임아웃 (단위:ms)
        # 5초 안에 응답이 오지 않으면 실패 처리
        response-timeout: 5000
        # 연결 타임아웃 (다운스트림 서비스와 연결을 맺는 시간)
        connect-timeout: 1000

      # --- 모든 라우트에 기본으로 적용될 필터 ---
      default-filters:
        # 커스텀 필터 이름은 'Filter' 접미사를제외하고 카멜케이스로 작성
        - AuthenticationFilter
      # 라우팅 규칙 정의 (routes는 List 형태)
      routes:
        # --- 회원 서비스 라우트 ---
        - id: member-service-route  # 각 라우트의 고유 ID
          # 'lb'는 LoadBalancer를 의미
          # Eureka에서 'member-service`라는 이름의 서비스 목록을 찾아 로드밸런싱 하여 요청을 보내라
          uri: lb://member-service
          # 이 라우트가 적용될 조건
          predicates:
            - Path=/api/v1/members/**   #/api/v1/members/로 시작하는 모든 요청
          # filters 섹션 추가
          filters:
            # AddRequestHeader 필터 사용
            # Name: 필터 이름, args: 필터에 전달할 인자
            - name: AddRequestHeader
              args:
                name: X-Request-Source # 헤더의 Key
                value: gateway-service # 헤더의 Value
            # (축약형) AddResponseHeader 필터도 추가해보자 ("필터이름=인자1,인자2,..."
            - AddResponseHeader=X-Response-Source, gateway-service

        - id: some-slow-service-route # 예: 외부 시스템과 연동하는 느린 서비스
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/slow-service/**
          metadata:
            response-timeout: 10000
            connect-timeout: 2000
        # --- (미래) 상품 서비스 라우트 ---
        - id: product-service-route
          uri: http://localhost:8082  # 아직 존재하지 않는 서비스
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses:   # 어떤 HTTP 상태 코드일 때 재시도 할 것인가?
                  - BAD_GATEWAY # 502
                  - SERVICE_UNAVAILABLE # 503
                  - GATEWAY_TIMEOUT #504
                methods:  # 어떤 HTTP 메서드에만 시도할 것인가?
                  - GET # 멱등성이 보장되는 GET, HEAD, OPTIONS
                backoff:  # 재시도 간격 설정(Exponential Backoff)
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2   # 대기 시간을 2배씩 증가

                  basedOnPreviousValue: true

        # -- (미래) 주문 서비스 라우트 --
        - id: order-service-route
          uri: http://localhost:8083  # 아직 존재하지 않는 서비스
          predicates:
            - Path=/api/v1/orders/**